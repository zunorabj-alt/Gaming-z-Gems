<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming-Z Gems</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Chargement...</div>
</div>

<!-- FACEBOOK -->
<a class="fb-icon" href="https://www.facebook.com/gaming1z1gems" target="_blank">f</a>

<!-- HEADER -->
<header>
  <img src="file_000000005b5871fbaaa1cb6c079a09fd.png" class="logo">
  <h1>Gaming-Z Gems</h1>
  <button onclick="toggleTheme()">☾</button>
</header>

<!-- GAMES -->
<section class="games">

<div class="game" onclick="showGame()">
<img src="raf,360x360,075,t,fafafa_ca443f4786.jpg">
<h3>Free Fire</h3>
</div>

<div class="game" onclick="showGame()">
<img src="158789020-unavailable-stamp-unavailable-sign-round-grunge-label.jpg">
<h3>PUBG</h3>
</div>

</section>

<!-- TARIFS -->
<section id="tarifs" class="tarifs">

<div class="card" onclick="openForm('110💎')">
<img src="5ed92d5e8e37c95bdd0df84711fd6246.webp">
<p>110💎</p>
</div>

<div class="card" onclick="openForm('Weekly')">
<img src="oss-a4dc82551f55d986ea4bab3e8521c172.png">
<p>Weekly</p>
</div>

<div class="card" onclick="openForm('Monthly')">
<img src="oss-3c8ac1d57fcaeb222b2fe02d9f8cc5d8.png">
<p>Monthly</p>
</div>

</section>

<!-- OVERLAY -->
<div class="overlay" onclick="closeForm()"></div>

<!-- POPUP FORM -->
<form action="https://formspree.io/f/xbdqglgd" method="POST"
class="popup" id="formBox" onsubmit="return sendOrder(event)">

<h2>COMMANDE</h2>

<input name="uid" placeholder="UID" required>
<input name="pseudo" placeholder="Pseudo" required>
<input name="ref" placeholder="Référence" required>

<input type="hidden" id="productInput" name="product">

<button type="submit">ENVOYER</button>

</form>

<!-- SUCCESS -->
<div id="successBox" class="success">
  <div class="success-content">
    <h2>✔ ENVOYÉ</h2>
    <p id="orderMsg"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
